<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Thanh Toán - 50cntt1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#004471", "surface": "#f3faff", "on-surface": "#141d21" },
                    fontFamily: { "headline": ["Plus Jakarta Sans"], "body": ["Be Vietnam Pro"] }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface font-body pt-24 pb-20">
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md shadow-sm">
        <div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto">
            <a href="index.html" class="text-2xl font-bold tracking-tight text-blue-900">50cntt1</a>
            <a href="dashboard.html" class="material-symbols-outlined text-slate-600 p-2 hover:bg-slate-100 rounded-full">account_circle</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8">
        <h1 class="text-4xl font-headline font-bold text-primary mb-10">Thanh toán & Đặt chỗ</h1>
        <div class="grid grid-cols-1 md:grid-cols-12 gap-12">
            <div class="md:col-span-7 space-y-8">
                <section class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                    <h2 class="text-xl font-headline font-bold mb-6 border-b pb-4">Thông tin liên hệ</h2>
                    <div class="space-y-4">
                        <input type="text" placeholder="Họ và tên" class="w-full bg-slate-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-primary/20"/>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="email" placeholder="Email" class="w-full bg-slate-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-primary/20"/>
                            <input type="tel" placeholder="Số điện thoại" class="w-full bg-slate-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-primary/20"/>
                        </div>
                    </div>
                </section>
                <section class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                    <h2 class="text-xl font-headline font-bold mb-6 border-b pb-4">Phương thức thanh toán</h2>
                    <div class="space-y-4">
                        <label class="flex items-center gap-4 p-4 border rounded-xl cursor-pointer hover:bg-slate-50">
                            <input type="radio" name="payment" class="w-5 h-5 text-primary" checked/>
                            <span class="font-semibold">Chuyển khoản ngân hàng (QR Code)</span>
                        </label>
                        <label class="flex items-center gap-4 p-4 border rounded-xl cursor-pointer hover:bg-slate-50">
                            <input type="radio" name="payment" class="w-5 h-5 text-primary"/>
                            <span class="font-semibold">Thẻ tín dụng / Ghi nợ</span>
                        </label>
                    </div>
                </section>
            </div>
            <aside class="md:col-span-5">
                <div class="sticky top-28 bg-white p-8 rounded-2xl shadow-lg border border-slate-100">
                    <h3 class="font-headline font-bold text-xl mb-6">Tóm tắt đơn hàng</h3>
                    <div class="flex gap-4 mb-6">
                        <img src="https://images.unsplash.com/photo-1599708153386-62bf2ef79133" class="w-24 h-24 object-cover rounded-lg" alt="Tour"/>
                        <div>
                            <h4 class="font-bold text-primary">Khám Phá Vịnh Hạ Long</h4>
                            <p class="text-sm text-slate-500 mt-1">25 Tháng 12, 2026</p>
                            <p class="text-sm text-slate-500">2 Người lớn</p>
                        </div>
                    </div>
                    <div class="space-y-3 border-t pt-6 mb-6">
                        <div class="flex justify-between text-sm"><span class="text-slate-500">Giá tour x2</span><span class="font-semibold">8.500.000đ</span></div>
                        <div class="flex justify-between text-sm"><span class="text-slate-500">Thuế & Phí</span><span class="font-semibold">0đ</span></div>
                        <div class="flex justify-between text-xl font-bold mt-4 pt-4 border-t"><span class="text-primary">Tổng cộng</span><span class="text-primary">8.500.000đ</span></div>
                    </div>
                    <a href="dashboard.html" class="block w-full text-center bg-primary text-white py-4 rounded-full font-bold text-lg hover:bg-blue-800 transition">Hoàn tất đặt vé</a>
                </div>
            </aside>
        </div>
    </main>
</body>
</html>
