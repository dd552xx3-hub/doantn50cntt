<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hồ Sơ Của Tôi - 50cntt1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        "primary": "#004471", 
                        "primary-light": "#005da3",
                        "surface": "#f8fafc", 
                        "secondary": "#e85d04",
                        "accent": "#fbbf24"
                    }, 
                    fontFamily: { 
                        "headline": ["Plus Jakarta Sans"], 
                        "body": ["Be Vietnam Pro"] 
                    } 
                } 
            } 
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }
        .goog-te-gadget { font-family: 'Plus Jakarta Sans', sans-serif !important; }
        .goog-te-gadget-simple { background-color: #f8fafc !important; border: 1px solid #e2e8f0 !important; border-radius: 9999px !important; padding: 4px 10px !important; flex-shrink: 0; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-surface font-body antialiased pt-20 min-h-screen">
    
    <nav class="fixed top-0 w-full z-50 glass border-b border-slate-200/50">
        <div class="flex justify-between items-center px-6 md:px-8 py-4 max-w-7xl mx-auto">
            <a href="index.html" class="text-2xl font-black text-primary tracking-tighter">50cntt1<span class="text-accent">.</span></a>
            <div class="hidden md:flex items-center gap-8 font-semibold text-sm tracking-wide text-slate-600">
                <a class="hover:text-primary transition-colors" href="destinations.html">Điểm đến</a>
                <a class="hover:text-primary transition-colors" href="tours.html">Tour du lịch</a>
                <a class="hover:text-primary transition-colors" href="blog.html">Cẩm nang</a>
                <a class="hover:text-primary transition-colors" href="index.html#trai-nghiem">Trải nghiệm</a>
            </div>
            <div class="flex items-center gap-3">
                <div id="google_translate_element" class="overflow-hidden rounded-lg opacity-80 hover:opacity-100 transition-opacity flex items-center"></div>
                <a href="cart.html" class="p-2 hover:bg-slate-100 rounded-full transition-all relative group">
                    <span class="material-symbols-outlined text-slate-600 group-hover:text-primary">shopping_cart</span>
                </a>
                <div id="user-menu" class="flex items-center gap-3 bg-blue-50 px-3 py-1.5 rounded-full border border-blue-100 shadow-sm">
                    <span id="user-email-nav" class="text-xs font-bold text-primary truncate max-w-[100px]"></span>
                    <button id="btn-logout" class="text-[10px] font-black text-red-500 uppercase tracking-tighter hover:text-red-700 transition-colors">Thoát</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-12">
        <div class="text-center mb-16">
            <h1 class="text-4xl md:text-5xl font-headline font-black text-primary mb-4 tracking-tight">Hồ Sơ Cá Nhân</h1>
            <p class="text-slate-500 text-lg font-light">Quản lý thông tin và theo dõi lịch trình của bạn</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Sidebar: Profile Info -->
            <div class="md:col-span-1 space-y-6">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl shadow-primary/5 border border-slate-100 text-center">
                    <div class="w-24 h-24 bg-primary/10 text-primary rounded-full flex items-center justify-center mx-auto mb-4 text-4xl font-black">
                        <span id="user-initials">U</span>
                    </div>
                    <h2 id="profile-name" class="text-xl font-bold text-primary mb-1">Người dùng</h2>
                    <p id="profile-email" class="text-sm text-slate-400 truncate"></p>
                    <div class="mt-6 pt-6 border-t border-slate-50">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Thành viên từ</p>
                        <p id="member-since" class="text-sm font-medium text-slate-600">---</p>
                    </div>
                </div>
            </div>

            <!-- Main Content: Booking History -->
            <div class="md:col-span-2">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-headline font-black text-primary flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">history</span> Lịch sử đặt tour
                    </h2>
                    <span id="booking-count" class="bg-primary/10 text-primary px-3 py-1 rounded-full text-xs font-bold">0 đơn hàng</span>
                </div>

                <div id="history-container" class="space-y-4">
                    <div class="flex flex-col items-center justify-center py-20 text-slate-400">
                        <span class="material-symbols-outlined text-6xl mb-4">event_busy</span>
                        <p class="font-medium">Bạn chưa có chuyến đi nào.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBENGuoNVCBveOfFnGwh2CkhX9ckoB5Gk",
            authDomain: "doantn50cntt.firebaseapp.com",
            projectId: "doantn50cntt",
            storageBucket: "doantn50cntt.firebasestorage.app",
            messagingSenderId: "705512357448",
            appId: "1:705512357448:web:844e8f876c4db1e89ae27d"
        };

        const app = !getApps().length ? initializeApp(firebaseConfig) : getApp();
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('user-email-nav').innerText = user.email.split('@')[0];
                document.getElementById('profile-email').innerText = user.email;
                const initials = user.email.split('@')[0].charAt(0).toUpperCase();
                document.getElementById('user-initials').innerText = initials;
                
                // Lấy thông tin từ collection users
                try {
                    const userDoc = await getDocs(query(collection(db, "users"), where("email", "==", user.email)));
                    if (!userDoc.empty) {
                        const userData = userDoc.docs[0].data();
                        document.getElementById('profile-name').innerText = userData.hoTen || "Khách hàng";
                        document.getElementById('member-since').innerText = userData.ngayTao || "---";
                    }
                } catch (e) { console.error(e); }

                loadBookingHistory(user.email);
            } else {
                window.location.href = "login.html";
            }
        });

        async function loadBookingHistory(userEmail) {
            const container = document.getElementById('history-container');
            const countEl = document.getElementById('booking-count');

            try {
                const q = query(collection(db, "bookings"), where("email", "==", userEmail), orderBy("ngayDat", "desc"));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    container.innerHTML = `
                        <div class="bg-white p-12 rounded-[2.5rem] text-center border border-slate-100 shadow-sm">
                            <span class="material-symbols-outlined text-5xl text-slate-200 mb-4">event_busy</span>
                            <p class="text-slate-500 font-medium">Chưa có lịch sử đặt tour nào.</p>
                        </div>`;
                    countEl.innerText = "0 đơn hàng";
                    return;
                }

                container.innerHTML = "";
                countEl.innerText = `${querySnapshot.size} đơn hàng`;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    let statusClass = "bg-orange-50 text-orange-500";
                    if (data.trangThai === "Đã thanh toán") statusClass = "bg-blue-50 text-blue-500";
                    if (data.trangThai === "Hoàn thành") statusClass = "bg-green-50 text-green-500";
                    if (data.trangThai === "Đã hủy") statusClass = "bg-red-50 text-red-500";

                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col md:flex-row items-center gap-6 hover:shadow-md transition-all">
                            <img src="${data.imageUrl || 'https://via.placeholder.com/150'}" class="w-24 h-24 rounded-2xl object-cover shadow-sm">
                            <div class="flex-1 text-center md:text-left">
                                <h3 class="font-bold text-lg text-primary mb-1">${data.tenTour}</h3>
                                <p class="text-xs text-slate-400 mb-3 flex items-center justify-center md:justify-start gap-1">
                                    <span class="material-symbols-outlined text-sm">calendar_month</span> ${data.ngayDat}
                                </p>
                                <div class="flex flex-wrap justify-center md:justify-start gap-3">
                                    <span class="text-sm font-black text-secondary">${data.giaTour}</span>
                                    <span class="${statusClass} px-3 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-widest">${data.trangThai}</span>
                                </div>
                            </div>
                            <a href="tour-detail.html?id=${data.tourId}" class="text-primary hover:text-secondary p-3 bg-blue-50 rounded-full transition-all">
                                <span class="material-symbols-outlined">arrow_forward</span>
                            </a>
                        </div>
                    `;
                });
            } catch (e) {
                console.error(e);
                container.innerHTML = "<p class='text-red-500 text-center'>Lỗi khi tải dữ liệu lịch sử.</p>";
            }
        }

        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => window.location.reload());
    </script>
</body>
</html>
