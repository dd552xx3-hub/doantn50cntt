<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng Ký - 50cntt1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = { theme: { extend: { colors: { "primary": "#004471", "surface": "#f3faff" }, fontFamily: { "headline": ["Plus Jakarta Sans"], "body": ["Be Vietnam Pro"] } } } }
    </script>
</head>
<body class="bg-surface font-body min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl shadow-primary/5 overflow-hidden border border-slate-100">
        <div class="p-8 md:p-10">
            <div class="text-center mb-10">
                <a href="index.html" class="text-3xl font-black text-primary mb-2 block">50cntt1</a>
                <h1 class="text-2xl font-headline font-bold text-slate-800">Tạo tài khoản mới</h1>
                <p class="text-slate-500 mt-2 text-sm">Gia nhập cộng đồng du lịch cùng chúng tôi</p>
            </div>

            <form class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Họ và tên</label>
                    <input type="text" placeholder="Nguyễn Văn A" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 transition-all"/>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Địa chỉ Email</label>
                    <input type="email" placeholder="email@vi-du.com" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 transition-all"/>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Mật khẩu</label>
                    <input type="password" placeholder="••••••••" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 transition-all"/>
                </div>
                
                <button type="button" onclick="location.href='index.html'" class="w-full bg-primary text-white py-4 rounded-xl font-bold shadow-lg shadow-primary/20 hover:bg-blue-800 transition-all active:scale-[0.98] mt-4">
                    Đăng ký ngay
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-100 text-center">
                <p class="text-sm text-slate-500">
                    Đã có tài khoản? 
                    <a href="login.html" class="text-primary font-bold hover:underline">Đăng nhập</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
