<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng Ký - 50cntt1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = { theme: { extend: { colors: { "primary": "#004471", "surface": "#f3faff", "secondary": "#e85d04" }, fontFamily: { "headline": ["Plus Jakarta Sans"], "body": ["Be Vietnam Pro"] } } } }
    </script>
</head>
<body class="bg-surface font-body antialiased flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <a href="index.html" class="text-3xl font-bold tracking-tight text-primary block mb-2">50cntt1</a>
            <h1 class="text-2xl font-headline font-black text-slate-800">Tạo tài khoản mới</h1>
        </div>

        <form id="register-form" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Họ và Tên</label>
                <input type="text" id="reg-name" placeholder="Nguyễn Văn A" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/20" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Email</label>
                <input type="email" id="reg-email" placeholder="email@vidu.com" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/20" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Mật khẩu</label>
                <input type="password" id="reg-password" placeholder="Tối thiểu 6 ký tự" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/20" required minlength="6">
            </div>
            <button type="submit" id="reg-btn" class="w-full bg-primary text-white py-4 rounded-full font-bold shadow-lg hover:bg-blue-800 transition active:scale-95 mt-4">
                Đăng ký ngay
            </button>
        </form>
        
        <p class="text-center text-sm text-slate-500 mt-6">Đã có tài khoản? <a href="login.html" class="text-primary font-bold hover:underline">Đăng nhập</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBENGuoNVCBveOfFnGwh2CkhX9ckoB5Gk",
            authDomain: "doantn50cntt.firebaseapp.com",
            projectId: "doantn50cntt",
            storageBucket: "doantn50cntt.firebasestorage.app",
            messagingSenderId: "705512357448",
            appId: "1:705512357448:web:844e8f876c4db1e89ae27d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById('register-form');
        const btn = document.getElementById('reg-btn');

        if(form) {
            form.onsubmit = async (e) => {
                e.preventDefault();
                btn.innerText = "Đang xử lý...";
                btn.disabled = true;
                
                const name = document.getElementById('reg-name').value;
                const email = document.getElementById('reg-email').value;
                const password = document.getElementById('reg-password').value;

                try {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    await setDoc(doc(db, "users", user.uid), {
                        hoTen: name,
                        email: email,
                        ngayTao: new Date().toLocaleString('vi-VN'),
                        role: "user"
                    });

                    alert("Đăng ký thành công!");
                    window.location.href = "index.html";
                    
                } catch (error) {
                    console.error(error);
                    let msg = "Đã có lỗi xảy ra trong quá trình đăng ký.";
                    if(error.code === 'auth/email-already-in-use') msg = "Email này đã được sử dụng trên hệ thống!";
                    if(error.code === 'auth/weak-password') msg = "Mật khẩu quá yếu, vui lòng nhập ít nhất 6 ký tự.";
                    alert(msg);
                    
                    btn.innerText = "Đăng ký ngay";
                    btn.disabled = false;
                }
            };
        }
    </script>
</body>
</html>
