<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chi Tiết Hành Trình - 50cntt1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = { theme: { extend: { colors: { "primary": "#004471", "surface": "#f3faff", "secondary": "#e85d04" }, fontFamily: { "headline": ["Plus Jakarta Sans"], "body": ["Be Vietnam Pro"] } } } }
    </script>
</head>
<body class="bg-surface text-slate-800 font-body pb-20 antialiased">
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md shadow-sm">
        <div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto">
            <a href="index.html" class="text-2xl font-bold tracking-tight text-primary">50cntt1</a>
            <div class="hidden md:flex items-center gap-8 font-medium text-sm tracking-wide">
                <a class="text-slate-600 hover:text-primary transition-colors pb-1" href="destinations.html">Điểm đến</a>
                <a class="text-slate-600 hover:text-primary transition-colors pb-1" href="tours.html">Tour du lịch</a>
                <a class="text-slate-600 hover:text-primary transition-colors pb-1" href="#">Trải nghiệm</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="cart.html" aria-label="Giỏ hàng" class="p-2 hover:bg-slate-50 rounded-full transition-colors inline-block">
                    <span class="material-symbols-outlined text-slate-600">shopping_cart</span>
                </a>
                <a href="login.html" aria-label="Đăng nhập" class="p-2 hover:bg-slate-50 rounded-full transition-colors inline-block text-slate-600 font-bold hover:text-primary">
                    <span class="material-symbols-outlined">account_circle</span>
                </a>
                <a href="register.html" class="bg-primary text-white px-6 py-2 rounded-full font-medium text-sm transition-transform active:scale-95 shadow-md">Đăng ký</a>
            </div>
        </div>
    </nav>

    <div class="w-full h-[60vh] relative mt-16">
        <img id="detail-image" src="" class="w-full h-full object-cover bg-slate-200"/>
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
        <div class="absolute bottom-12 left-6 md:left-12 right-6 max-w-7xl mx-auto">
            <span id="detail-type" class="bg-secondary text-white px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest mb-4 inline-block shadow-lg"></span>
            <h1 id="detail-title" class="text-4xl md:text-6xl font-headline font-black text-white leading-tight drop-shadow-lg">Đang tải dữ liệu...</h1>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-6 md:px-12 mt-12 grid grid-cols-1 md:grid-cols-12 gap-12">
        <div class="md:col-span-8 space-y-8">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-2xl font-headline font-bold text-primary mb-6 flex items-center gap-2">
                    <span class="material-symbols-outlined text-3xl">info</span> Tổng quan hành trình
                </h2>
                <p id="detail-desc" class="text-slate-600 leading-relaxed text-lg italic animate-pulse">Vui lòng chờ một chút, hệ thống đang kết nối dữ liệu từ Firebase...</p>
            </div>
        </div>

        <div class="md:col-span-4">
            <div class="sticky top-28 bg-white p-8 rounded-3xl shadow-xl shadow-primary/5 border border-slate-100">
                <div class="flex items-center gap-3 text-slate-500 mb-6 font-bold uppercase tracking-widest text-sm border-b border-slate-100 pb-4">
                    <span class="material-symbols-outlined text-primary">schedule</span>
                    <span id="detail-time">---</span>
                </div>
                <div class="mb-8">
                    <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Giá trọn gói</p>
                    <div class="text-4xl font-headline font-black text-secondary tracking-tight">
                        <span id="detail-price">---</span>
                    </div>
                    <p class="text-sm text-slate-500 mt-2">/ khách</p>
                </div>
                <a id="book-btn" href="#" class="flex items-center justify-center gap-2 w-full text-center bg-primary text-white py-4 rounded-full font-bold text-lg hover:bg-blue-800 transition-all active:scale-95 shadow-lg shadow-primary/30">
                    Đặt Tour Ngay <span class="material-symbols-outlined">arrow_forward</span>
                </a>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBENGuoNVCBveOfFnGwh2CkhX9ckoB5Gk",
            authDomain: "doantn50cntt.firebaseapp.com",
            projectId: "doantn50cntt",
            storageBucket: "doantn50cntt.firebasestorage.app",
            messagingSenderId: "705512357448",
            appId: "1:705512357448:web:844e8f876c4db1e89ae27d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadTourDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const tourId = urlParams.get('id');

            if (!tourId) {
                document.getElementById('detail-title').innerText = "Lỗi: Không tìm thấy Tour!";
                document.getElementById('detail-desc').innerText = "Vui lòng quay lại trang Chủ hoặc trang Danh sách Tour để chọn lại.";
                document.getElementById('detail-desc').classList.remove('italic', 'animate-pulse');
                document.getElementById('detail-desc').classList.add('text-red-500', 'font-bold');
                return;
            }

            document.getElementById('book-btn').href = `checkout.html?id=${tourId}`;

            try {
                const docSnap = await getDoc(doc(db, "tours", tourId));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('detail-title').innerText = data.tenTour;
                    document.getElementById('detail-price').innerText = data.giaTour;
                    document.getElementById('detail-time').innerText = data.thoiGian;
                    document.getElementById('detail-desc').innerText = data.moTa;
                    document.getElementById('detail-desc').classList.remove('italic', 'animate-pulse');
                    document.getElementById('detail-type').innerText = data.loaiTour;
                    document.getElementById('detail-image').src = data.imageUrl;
                } else {
                    document.getElementById('detail-title').innerText = "Tour không tồn tại!";
                }
            } catch (error) {
                document.getElementById('detail-title').innerText = "Lỗi kết nối máy chủ!";
            }
        }
        loadTourDetail();
    </script>
</body>
</html>
