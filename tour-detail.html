<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chi Tiết Tour - 50cntt1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = { theme: { extend: { colors: { "primary": "#004471", "surface": "#f3faff", "secondary": "#e85d04" }, fontFamily: { "headline": ["Plus Jakarta Sans"], "body": ["Be Vietnam Pro"] } } } }
    </script>
</head>
<body class="bg-surface text-slate-800 font-body pb-20">
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md shadow-sm">
        <div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto">
            <a href="index.html" class="text-2xl font-bold tracking-tight text-blue-900">50cntt1</a>
            <a href="dashboard.html" class="material-symbols-outlined text-slate-600 p-2 hover:bg-slate-100 rounded-full">account_circle</a>
        </div>
    </nav>

    <div class="w-full h-[50vh] relative mt-16">
        <img id="detail-image" src="" alt="" class="w-full h-full object-cover"/>
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
        <div class="absolute bottom-10 left-8 right-8 max-w-7xl mx-auto">
            <span id="detail-type" class="bg-primary text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider mb-4 inline-block"></span>
            <h1 id="detail-title" class="text-4xl md:text-5xl font-headline font-bold text-white leading-tight">...</h1>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-8 mt-10 grid grid-cols-1 md:grid-cols-3 gap-12">
        <div class="md:col-span-2 space-y-8">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-2xl font-headline font-bold text-primary mb-4">Tổng quan hành trình</h2>
                <p id="detail-desc" class="text-slate-600 leading-relaxed italic">Đang tải dữ liệu...</p>
            </div>
        </div>

        <div class="md:col-span-1">
            <div class="sticky top-28 bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
                <div class="flex items-center gap-2 text-slate-500 mb-4 font-semibold uppercase tracking-wider text-sm">
                    <span class="material-symbols-outlined">schedule</span>
                    <span id="detail-time">---</span>
                </div>
                <div class="mb-8">
                    <p class="text-sm text-slate-500 mb-1">Giá trọn gói</p>
                    <div class="text-3xl font-headline font-black text-secondary">
                        <span id="detail-price">---</span><span class="text-xs font-normal text-slate-400 ml-1">/ khách</span>
                    </div>
                </div>
                <a href="checkout.html" class="block w-full text-center bg-primary text-white py-4 rounded-full font-bold text-lg hover:bg-blue-800 transition">Đặt Tour Ngay</a>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBENGuoNVCBveOfFnGwh2CkhX9ckoB5Gk",
            authDomain: "doantn50cntt.firebaseapp.com",
            projectId: "doantn50cntt",
            storageBucket: "doantn50cntt.firebasestorage.app",
            messagingSenderId: "705512357448",
            appId: "1:705512357448:web:844e8f876c4db1e89ae27d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadTourDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const tourId = urlParams.get('id');

            if (!tourId) return;

            try {
                const docRef = doc(db, "tours", tourId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('detail-title').innerText = data.tenTour;
                    document.getElementById('detail-price').innerText = data.giaTour;
                    document.getElementById('detail-time').innerText = data.thoiGian;
                    document.getElementById('detail-desc').innerText = data.moTa;
                    document.getElementById('detail-desc').classList.remove('italic');
                    document.getElementById('detail-type').innerText = data.loaiTour;
                    document.getElementById('detail-image').src = data.imageUrl;
                }
            } catch (error) {
                console.error(error);
            }
        }

        loadTourDetail();
    </script>
</body>
</html>
