<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Danh Sách Tour - 50cntt1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = { theme: { extend: { colors: { "primary": "#004471", "surface": "#f3faff", "secondary": "#e85d04" }, fontFamily: { "headline": ["Plus Jakarta Sans"], "body": ["Be Vietnam Pro"] } } } }
    </script>
</head>
<body class="bg-surface text-slate-800 font-body pt-24 pb-20">
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md shadow-sm">
    <div class="flex justify-between items-center px-6 md:px-8 py-4 max-w-7xl mx-auto">
        <a href="index.html" class="text-2xl font-bold tracking-tight text-primary">50cntt1</a>
        
        <div class="hidden md:flex items-center gap-8 font-medium text-sm tracking-wide text-slate-600">
            <a class="hover:text-primary transition-colors" href="destinations.html">Điểm đến</a>
            <a class="hover:text-primary transition-colors" href="tours.html">Tour du lịch</a>
            <a class="hover:text-primary transition-colors" href="#">Trải nghiệm</a>
        </div>

        <div class="flex items-center gap-4">
            <a href="cart.html" aria-label="Giỏ hàng" class="p-2 hover:bg-slate-50 rounded-full transition-colors inline-block">
                <span class="material-symbols-outlined text-slate-600">shopping_cart</span>
            </a>
            
            <div id="guest-menu" class="flex items-center gap-2 md:gap-4">
                <a href="login.html" aria-label="Đăng nhập" class="p-2 hover:bg-slate-50 rounded-full transition-colors inline-block text-slate-600 font-bold hover:text-primary">
                    <span class="material-symbols-outlined">account_circle</span>
                </a>
                <a href="register.html" class="bg-primary text-white px-5 md:px-6 py-2 rounded-full font-medium text-sm transition-transform active:scale-95 shadow-md whitespace-nowrap">
                    Đăng ký
                </a>
            </<div id="user-menu" class="hidden items-center gap-2 md:gap-3 bg-blue-50/50 px-3 py-1.5 rounded-full border border-blue-100">
    <a href="admin.html" class="text-primary flex items-center hover:scale-110 transition-transform">
        <span class="material-symbols-outlined text-base md:text-lg">admin_panel_settings</span>
    </a>
    <span class="w-[1px] h-4 bg-blue-200"></span>
    <span id="user-email" class="text-xs font-bold text-primary truncate max-w-[80px] md:max-w-[120px]"></span>
    <span class="w-[1px] h-4 bg-blue-200"></span>
    <button id="btn-logout" class="text-[10px] font-bold text-red-500 uppercase tracking-widest hover:text-red-700 transition-colors">Thoát</button>
</div>

        </div>
    </div>
</nav>


    <main class="max-w-7xl mx-auto px-6 md:px-8">
        <header class="mb-12">
            <h1 class="text-4xl font-headline font-black text-primary mb-4">Tất cả hành trình</h1>
            <p class="text-slate-500">Khám phá danh sách các tour du lịch được tuyển chọn kỹ lưỡng dành riêng cho bạn.</p>
        </header>

        <div id="all-tours-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="col-span-full text-center py-20 text-slate-400 animate-pulse">Hệ thống đang kết nối dữ liệu...</p>
        </div>
    </main>
    <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDBENGuoNVCBveOfFnGwh2CkhX9ckoB5Gk",
        authDomain: "doantn50cntt.firebaseapp.com",
        projectId: "doantn50cntt",
        storageBucket: "doantn50cntt.firebasestorage.app",
        messagingSenderId: "705512357448",
        appId: "1:705512357448:web:844e8f876c4db1e89ae27d"
    };

    const app = !getApps().length ? initializeApp(firebaseConfig) : getApp();
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        const guest = document.getElementById('guest-menu');
        const userBox = document.getElementById('user-menu');
        const emailTxt = document.getElementById('user-email');
        if (user) {
            if(guest) guest.style.display = 'none';
            if(userBox) { userBox.style.display = 'flex'; userBox.classList.remove('hidden'); }
            if(emailTxt) emailTxt.innerText = "Chào, " + user.email.split('@')[0];
        } else {
            if(guest) guest.style.display = 'flex';
            if(userBox) { userBox.style.display = 'none'; userBox.classList.add('hidden'); }
        }
    });

    const btnLogout = document.getElementById('btn-logout');
    if(btnLogout) {
        btnLogout.onclick = () => { signOut(auth).then(() => { window.location.reload(); }); };
    }

    function renderToursRealtime() {
        const container = document.getElementById("all-tours-list");
        if (!container) return;

        onSnapshot(collection(db, "tours"), (querySnapshot) => {
            container.innerHTML = ""; 
            if (querySnapshot.empty) {
                container.innerHTML = "<p class='col-span-full text-center py-20'>Chưa có tour nào được cập nhật.</p>";
                return;
            }
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;
                container.innerHTML += `
                    <article class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500 border border-slate-100 group">
                        <a href="tour-detail.html?id=${id}">
                            <div class="relative h-64 overflow-hidden">
                                <img src="${data.imageUrl}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                                <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest text-primary">${data.loaiTour}</div>
                            </div>
                            <div class="p-8">
                                <h3 class="text-2xl font-headline font-bold text-primary mb-3">${data.tenTour}</h3>
                                <div class="flex items-center gap-4 text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">
                                    <span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">schedule</span> ${data.thoiGian}</span>
                                </div>
                                <div class="flex justify-between items-end">
                                    <div>
                                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Giá từ</p>
                                        <p class="text-2xl font-black text-secondary">${data.giaTour}</p>
                                    </div>
                                    <span class="bg-primary/10 text-primary p-3 rounded-full group-hover:bg-primary group-hover:text-white transition-colors">
                                        <span class="material-symbols-outlined">arrow_forward</span>
                                    </span>
                                </div>
                            </div>
                        </a>
                    </article>
                `;
            });
        });
    }
    renderToursRealtime();
</script>


    </body>
</html>
